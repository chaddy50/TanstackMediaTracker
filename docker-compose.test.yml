services:
  postgres_test:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: media_tracker
      POSTGRES_PASSWORD: media_tracker
      POSTGRES_DB: media_tracker_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U media_tracker -d media_tracker_test"]
      interval: 5s
      timeout: 5s
      retries: 5
    tmpfs:
      - /var/lib/postgresql/data
